#version: "3.8"


#without docker swarm first
services:
  nginx:
    build: ./requirements/nginx/.
    container_name: nginx
    restart: on-failure
    ports:
     - "443:443"
     - "8080:80"
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      #- ./requirements/nginx/conf:/etc/nginx/conf.d
      #- wordpress_data:/var/www/html
      - ../secrets/ssl:/etc/nginx/certs:ro
    #secrets:
    #  - privKey
    #  - certificate


  wordpress:
    build: ./requirements/WordPress/.
    container_name: wordpress
    volumes:
      - wordpress_data:/var/www/html # wordpress volume 
      # configure own page path
    restart: on-failure
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_DB_PREFIX: ${WP_DB_PREFIX}
    secrets:
      - wp_admin_password 
      - wp_user_password
      - db_user_password
    networks:
      - inception
    depends_on:
      mariadb:
        condition: service_healthy
    

  mariadb:
    build: ./requirements/MariaDB/.
    volumes:
      - mariadb_data:/var/lib/mysql
    container_name: mariadb
    restart: on-failure
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
    secrets:
      - db_root_password
      - db_user_password
      - wp_admin_password
    networks:
      - inception
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5 
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/poverbec/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/poverbec/data/wordpress

networks:
  inception: 
    name: inception
    driver: bridge

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_user_password:
    file: ../secrets/db_user_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  #privKey:
  #  file: ../secrets/privKey.pem
  #certificate:
  #  file: ../secrets/certificate.pem



