#version: "3.8"


#without docker swarm first
services:
  nginx:
    build: ./requirements/nginx/.
    container_name: nginx
    restart: on-failure
    ports:
     - "443:443"
     - "8080:80"
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      - ./requirements/nginx/conf:/etc/nginx/conf.d
      - wordpress_data:/var/www/html
      - ../secrets/ssl:/etc/nginx/certs:ro
    secrets:
      - privKey
      - certificate


  wordpress:
    build: ./requirements/WordPress/.
    container_name: wordpress
    volumes:
      - wordpress_data:/var/www/html # wordpress volume 
      # configure own page path
    restart: on-failure
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_DB_PREFIX: ${WP_DB_PREFIX}
      WP_USER: ${WP_USER}
      WORDPRESS_CONFIG_EXTRA:
    secrets:
      - wp_admin_password 
      - wp_user_password
      - db_user_password
      - db_root_password
    networks:
      - inception
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    build:
      context: ./requirements/redisCache
      dockerfile: Dockerfile
    image: redis
    container_name: redis
    restart: on-failure
    networks:
      - inception
  
  FTP_Server:
    build:
      context: ./requirements/FTP_Server
      image: lscr.io/linuxserver/filezilla:latest
      dockerfile: Dockerfile
      container_name: ftp_server
      #volumes:
      #- wordpress_data:/var/www/html
      #ports:
      #  - "21:21"
      #  - "21100-21110:21100-21110"
      #secrets:
      #  - certificate
      #  - privKey
      #networks:
      #  - inception
      #restart: unless-stopped
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=Etc/UTC #Timezone 
      volumes:
       - /path/to/config:/config
      ports:
        #- 3000:3000 # for HTTP
        - 3001:3001
      shm_size: "1gb"
      restart: unless-stopped

  #sealskin:
  #  image: lscr.io/linuxserver/sealskin:latest
  #  container_name: sealskin
  #  environment:
  #    - PUID=1000
  #    - PGID=1000
  #    - TZ=Etc/UTC
  #    - "HOST_URL=IP or subdomain.doman.com" #optional
  #  volumes:
  #    - /path/to/sealskin/config:/config
  #    - /path/to/sealskin/storage:/storage
  #    - /var/run/docker.sock:/var/run/docker.sock
  #  ports:
  #    - 8443:8443
  #    - 8000:8000 #optional
  #  restart: unless-stopped

  mariadb:
    build: ./requirements/MariaDB/.
    volumes:
      - mariadb_data:/var/lib/mysql
    container_name: mariadb
    restart: on-failure
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
    secrets:
      - db_root_password
      - db_user_password
      - wp_admin_password
    networks:
      - inception
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5 


      
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/poverbec/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/poverbec/data/wordpress

networks:
  inception: 
    name: inception
    driver: bridge

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_user_password:
    file: ../secrets/db_user_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  privKey:
    file: ../secrets/ssl/privKey.pem
  certificate:
    file: ../secrets/ssl/certificate.pem



