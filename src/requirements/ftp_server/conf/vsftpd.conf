


#dont daemonize
listen=YES
local_enable=YES
write_enable=YES

# Disable PAM authentication
pam_service_name=NO

# Basic settings
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES


# FTP user restriction
chroot_local_user=YES
allow_writeable_chroot=YES
local_root=/var/www/html

local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

# SSL/TLS
ssl_enable=YES
rsa_cert_file=/etc/ssl/certs/ftp-cert.pem
rsa_private_key_file=/etc/ssl/private/ftp-key.pem
allow_anon_ssl=NO
force_local_data_ssl=NO
force_local_logins_ssl=NO
ssl_tlsv1=YES
ssl_sslv2=NO
ssl_sslv3=NO



pasv_enable=YES
pasv_address=0.0.0.0 # take all ports 
#pasv_address=127.0.0.1 # vsftpd auto dectect interface
pasv_min_port=30000
pasv_max_port=30009

# Logging
xferlog_enable=YES
log_ftp_protocol=YES

# Security
seccomp_sandbox=NO