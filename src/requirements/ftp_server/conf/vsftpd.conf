


#dont daemonize
background=NO
listen=YES
listen_ipv6=NO

# Disable PAM authentication
pam_service_name=NO

# Basic settings
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

# Passive mode settings
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30009
pasv_address=0.0.0.0 # take all ports 

# FTP user restriction
chroot_local_user=YES
allow_writeable_chroot=YES
local_root=/var/www/html

#local_umask=022
#dirmessage_enable=YES
#use_localtime=YES
#xferlog_enable=YES
#connect_from_port_20=YES

## SSL/TLS
##ssl_enable=YES
##rsa_cert_file=/run/secrets/FTPcertificate
##rsa_private_key_file=/run/secrets/FTPprivKey

## SSL optional not forced 
#allow_anon_ssl=NO
#force_local_data_ssl=NO
#force_local_logins_ssl=NO
#ssl_tlsv1=NO
#ssl_tlsv1_1=NO
#ssl_sslv2=YES
#ssl_sslv3=YES

## Accept any certificate (server-side setting)
#ssl_ciphers=HIGH


# Logging
xferlog_enable=YES
log_ftp_protocol=YES

# Security
seccomp_sandbox=NO