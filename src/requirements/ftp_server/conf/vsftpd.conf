



listen=YES
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES
chroot_local_user=YES
secure_chroot_dir=/var/run/vsftpd/empty
#pam_service_name=vsftpd # no pluggable authenication modules 
check_shell=NO   
allow_writeable_chroot=YES
# instead of certificates selfsigned? 
ssl_enable=YES
rsa_cert_file=/etc/ssl/certs/ftp-cert.pem
rsa_private_key_file=/etc/ssl/private/ftp-key.pem
pasv_enable=YES
#pasv_address=127.0.0.1 # vsftpd auto dectect interface
pasv_min_port=30000
pasv_max_port=30009