# HTTPS server block for wordpress 
server {
    
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name poverbec.42.fr;

    # add SSL certificate
    ssl_protocols TLSv1.3;
    ssl_certificate /etc/nginx/certs/certificate.pem;
    ssl_certificate_key /etc/nginx/certs/privKey.pem;

    # Add location blocks for WordPress
    root /var/www/html;
    index index.php index.html;

    # reverse proxy 
    location /portfolio/ {
        proxy_pass http://portfolio:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }


    # ngix passes request of index.php to wp container on port 9000
    location ~ \.php$ {
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # $document_root + $fastcgi_script_name becomes -> /var/www/html/index.php
        include fastcgi_params;
    }



}

