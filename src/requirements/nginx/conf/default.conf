



# HTTP server block - redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.poverbec.42.fr poverbec.42.fr;
    
    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}



server {
    
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.poverbec.42.fr poverbec.42.fr
   

    # TLS 1.3 only 
    #Strictly define the allowed protocols
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;


    # HSTS (ngx_http_headers_module is required) (63072000 seconds)
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Use high-security ciphers
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Paths to your SSL certificates
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SharedNixCraftSSL:10m; 
    ssl_session_tickets off;
 

    # verify chain of trust of OCSP response using Root CA and Intermediate certs
    ssl_trusted_certificate /etc/nginx/ssl/fullchain.pem;


    # replace with the IP address of your resolver
    resolver 8.8.8.8;
}